name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build Windows exe
        run: make release-win-exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ow-custommatch-bot.exe
          generate_release_notes: true
