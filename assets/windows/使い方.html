<title>ow-custommatch-bot 使い方</title>
<h1>ow-custommatch-bot 使い方</h1>
<p>1. 同じフォルダ内の <code>.env</code> を開き、<code>BOT_TOKEN=...</code> を設定してください。</p>
<p>2. <code>ow-custommatch-bot.exe</code> をダブルクリックして起動してください。</p>
<p>3. 初回起動時に <code>ow-custommatch-bot.db</code> と <code>.logs/</code> が作成されます。</p>
<p>4. Discord サーバーで <code>/match</code> コマンドを使用してください。</p>
<p>5. 終了する場合はウィンドウを閉じるか <code>Ctrl + C</code> を押してください。</p>
</html>
